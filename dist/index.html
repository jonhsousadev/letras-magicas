<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0ea5e9">
    <meta name="description" content="Jogo educativo para aprender letras e formar palavras">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Letras Mágicas">
    <link rel="manifest" href="/letras-magicas/manifest.json">
    <link rel="apple-touch-icon" href="/letras-magicas/icons/icon.svg">
    <title>Letras Mágicas</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" crossorigin src="/letras-magicas/assets/index-_z-m2TS-.js"></script>
  <link rel="stylesheet" crossorigin href="/letras-magicas/assets/index-CBF5YqFP.css">
</head>
<body>
    <div id="game-container" class="bg-white p-6 rounded-[40px] shadow-2xl border-8 border-white max-w-lg w-full text-center relative min-h-[600px] flex flex-col">
        
        <div id="screen-start" class="flex-1 flex flex-col items-center justify-center space-y-4 animate-pop">
            <div class="text-8xl mb-2 floating">🎨</div>
            <h1 class="text-4xl font-black text-sky-600">Letras Mágicas</h1>
            
            <div class="w-full space-y-3 mt-4">
                <p class="text-gray-600 font-bold text-sm">Escolhe o modo de jogo:</p>
                
                <button id="btn-start-classic" class="bg-green-500 hover:bg-green-600 text-white px-8 py-4 rounded-2xl text-xl font-black shadow-xl transition-transform active:scale-95 border-b-4 border-green-700 w-full flex items-center justify-center gap-3">
                    <span class="text-3xl">🎯</span>
                    <span>Modo Clássico</span>
                </button>
                
                <button id="btn-start-syllables" class="bg-purple-500 hover:bg-purple-600 text-white px-8 py-4 rounded-2xl text-xl font-black shadow-xl transition-transform active:scale-95 border-b-4 border-purple-700 w-full flex items-center justify-center gap-3">
                    <span class="text-3xl">✂️</span>
                    <span>Formar Palavras</span>
                </button>
            </div>

            <div class="w-full bg-sky-100 p-4 rounded-3xl border-2 border-sky-200 mt-4">
                <h3 class="text-sky-700 font-black mb-2 flex items-center justify-center gap-2 text-lg">
                    🏆 Melhores Pontuações
                </h3>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <p class="text-sky-600 text-xs font-bold mb-1">🎯 Clássico</p>
                        <div id="high-scores-classic" class="space-y-1 text-xs font-bold text-sky-800">
                        </div>
                    </div>
                    <div>
                        <p class="text-purple-600 text-xs font-bold mb-1">✂️ Palavras</p>
                        <div id="high-scores-syllables" class="space-y-1 text-xs font-bold text-purple-800">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-playing" class="flex-1 flex flex-col hidden-screen">
            <div class="flex justify-between items-center mb-4">
                <div class="flex-1 bg-gray-100 h-4 rounded-full mr-4 overflow-hidden">
                    <div id="progress-bar" class="progress-bar-inner h-full bg-green-400" style="width: 0%"></div>
                </div>
                <div class="bg-yellow-100 px-3 py-1 rounded-full flex items-center gap-2 border border-yellow-200">
                    <span class="text-lg">⭐</span>
                    <span id="current-score" class="font-bold text-yellow-700">0</span>
                </div>
            </div>

            <div class="flex-1 flex flex-col justify-center">
                <div class="mb-4">
                    <div id="display-letter-container" class="hidden">
                        <h1 id="display-letter" class="text-9xl font-black drop-shadow-lg animate-bounce">A</h1>
                    </div>
                    <div id="display-emoji-container" class="hidden">
                        <span id="display-emoji" class="text-9xl">🍍</span>
                    </div>
                    <div id="display-syllables-container" class="hidden">
                        <div id="display-word-preview" class="h-16 flex items-center justify-center">
                        </div>
                    </div>
                    <p id="game-question" class="text-gray-600 text-xl font-bold mt-2">Qual começa com esta letra?</p>
                </div>
                
                <div id="options-grid" class="grid grid-cols-3 gap-3">
                </div>

                <div id="syllables-grid" class="grid grid-cols-4 gap-2 hidden">
                </div>

                <div class="h-16 flex items-center justify-center mt-2">
                    <p id="feedback-text" class="text-xl font-black transition-all scale-90 opacity-0"></p>
                </div>
            </div>
            
            <div class="flex justify-between items-center">
                <p id="phase-counter" class="text-gray-300 text-xs mt-2 uppercase font-bold">Fase 1 de 20</p>
                <div id="attempts-display" class="flex gap-1 mt-2">
                    <span class="text-lg">❤️</span>
                    <span class="text-lg">❤️</span>
                </div>
            </div>
        </div>

        <div id="screen-success" class="flex-1 flex flex-col items-center justify-center hidden-screen animate-pop">
            <div class="text-9xl mb-4">👑</div>
            <h2 class="text-4xl font-black text-green-600 leading-none uppercase">Fantástico!</h2>
            <div class="bg-yellow-100 p-6 rounded-3xl border-4 border-yellow-300 my-6 w-full">
                <p class="text-yellow-800 font-bold mb-1 text-xl">Pontuação Final:</p>
                <span id="final-score-display" class="text-6xl font-black text-yellow-700">⭐ 0</span>
            </div>
            <button id="btn-restart" class="bg-sky-500 hover:bg-sky-600 text-white px-10 py-4 rounded-full text-2xl font-black shadow-lg transition-transform active:scale-95">
                VOLTAR AO INÍCIO 🔄
            </button>
        </div>

    </div>

</body>
</html>
