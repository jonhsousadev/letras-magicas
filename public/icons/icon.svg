<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blushGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a8b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff7e67;stop-opacity:1" />
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="90" r="75" fill="#ffd1ca" opacity="0.4" />

  <text x="200" y="110" text-anchor="middle" font-family="'Segoe UI', 'Fredoka One', 'Nunito', sans-serif" font-weight="900" font-size="72" fill="url(#blushGradient)" filter="url(#softShadow)" style="letter-spacing: 2px;">
    BLUSH
  </text>

  <text x="200" y="155" text-anchor="middle" font-family="Verdana, sans-serif" font-weight="700" font-size="16" fill="#8c7b78" style="letter-spacing: 4px; text-transform: uppercase;">
    Palavrinhas Mágicas
  </text>

  <path d="M120 40 L123 47 L130 50 L123 53 L120 60 L117 53 L110 50 L117 47 Z" fill="#ffcc00" />
  <path d="M280 60 L282 64 L288 66 L282 68 L280 72 L278 68 L272 66 L278 64 Z" fill="#ffcc00" opacity="0.7" />
  <circle cx="140" cy="35" r="2" fill="#ffcc00" />
  <circle cx="260" cy="45" r="3" fill="#ffcc00" />
</svg>
